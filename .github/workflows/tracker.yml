name: Thesis tracker (weekly)

on:
  schedule:
    - cron: "0 6 * * 6"
  push:
    branches: [main]
    paths: ["tracker-trigger.txt", ".github/workflows/l1.yml"]

permissions:
  contents: read

concurrency:
  group: thesis-tracker
  cancel-in-progress: false

jobs:
  study:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas
      - name: Get private pipeline
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: git clone -q "https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/huczchen-max/vbt-private.git" private
      - name: Run L1 lab (log captured either way)
        run: |
          if python private/thesis_tracker.py > private/tracker_run.log 2>&1; then
            echo "status=ok" >> private/tracker_run.log
          else
            echo "status=FAILED" >> private/tracker_run.log
          fi
          tail -5 private/tracker_run.log
      - name: Commit results to private repo
        run: |
          cd private
          git config user.name "vbt-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "tracker: $(date -u +%F)"
          git pull --rebase -X ours || true
          git push
